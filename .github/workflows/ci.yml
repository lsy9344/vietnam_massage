name: CI

on:
  pull_request:
  push:
  workflow_dispatch:
    inputs:
      run_full_e2e:
        description: "Run the full Playwright suite"
        required: false
        type: boolean
        default: false
      run_burn_in:
        description: "Run the Playwright smoke burn-in loop"
        required: false
        type: boolean
        default: false
      e2e_grep:
        description: "Optional Playwright grep filter for manual full e2e"
        required: false
        type: string
        default: ""
  schedule:
    - cron: "0 19 * * *"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  CI: "true"
  NODE_VERSION: "22"
  PNPM_VERSION: "10.12.1"
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/vietnam_massage
  DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/vietnam_massage
  NEXTAUTH_SECRET: test-nextauth-secret-at-least-32-characters
  NEXTAUTH_URL: http://127.0.0.1:3000
  PLAYWRIGHT_PORT: "3000"

jobs:
  fast-checks:
    name: Fast Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name != 'schedule'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Prisma schema
        run: pnpm exec prisma validate

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Lint story validators
        run: pnpm lint

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Unit tests
        run: pnpm test:unit

  build:
    name: Production Build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && (github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Restore Next.js cache
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('src/**/*', 'public/**/*', 'next.config.ts', 'package.json', 'tsconfig.json') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create test env file
        run: |
          cat > .env <<EOF
          DATABASE_URL="${DATABASE_URL}"
          DIRECT_DATABASE_URL="${DIRECT_DATABASE_URL}"
          NEXTAUTH_SECRET="${NEXTAUTH_SECRET}"
          NEXTAUTH_URL="${NEXTAUTH_URL}"
          EOF

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Production build
        run: pnpm build

  playwright-smoke:
    name: Playwright Smoke ${{ matrix.group }}
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
    timeout-minutes: 30
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && !inputs.run_full_e2e)
    strategy:
      fail-fast: false
      matrix:
        group: [auth, calls, settlements, dashboard]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: vietnam_massage
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d vietnam_massage"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/vietnam_massage
      DIRECT_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/vietnam_massage
      SMOKE_GROUP: ${{ matrix.group }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Apply migrations
        run: pnpm exec prisma migrate deploy

      - name: Seed local dev accounts
        run: pnpm exec tsx scripts/seed-dev-accounts.ts

      - name: Run representative e2e smoke
        run: |
          case "$SMOKE_GROUP" in
            auth)
              pnpm exec playwright test tests/e2e/story-1-2-auth-rbac.spec.ts --reporter=line
              ;;
            calls)
              pnpm exec playwright test tests/e2e/story-2-1-call-ledger-basic.spec.ts --reporter=line
              ;;
            settlements)
              pnpm exec playwright test tests/e2e/story-4-2-therapist-daily-settlement.spec.ts --reporter=line
              ;;
            dashboard)
              pnpm exec playwright test tests/e2e/story-6-1-today-dashboard.spec.ts --reporter=line
              ;;
            *)
              echo "Unknown smoke group: $SMOKE_GROUP"
              exit 1
              ;;
          esac

      - name: Upload Playwright artifacts
        if: failure() || cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-${{ matrix.group }}-${{ github.run_attempt }}
          path: |
            test-results/
            playwright-report/
          retention-days: 14

  playwright-full:
    name: Playwright Full ${{ matrix.shard }}
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
    timeout-minutes: 35
    if: >-
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_full_e2e) ||
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'))
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: vietnam_massage
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d vietnam_massage"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/vietnam_massage
      DIRECT_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/vietnam_massage
      E2E_GREP: ${{ github.event_name == 'workflow_dispatch' && inputs.e2e_grep || '' }}
      SHARD: ${{ matrix.shard }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Apply migrations
        run: pnpm exec prisma migrate deploy

      - name: Seed local dev accounts
        run: pnpm exec tsx scripts/seed-dev-accounts.ts

      - name: Run Playwright shard
        run: |
          echo "Running Playwright shard $SHARD/4"
          if [ -n "$E2E_GREP" ]; then
            pnpm exec playwright test --grep "$E2E_GREP" --shard="$SHARD/4" --reporter=line
          else
            pnpm exec playwright test --shard="$SHARD/4" --reporter=line
          fi

      - name: Upload Playwright artifacts
        if: failure() || cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-full-shard-${{ matrix.shard }}-${{ github.run_attempt }}
          path: |
            test-results/
            playwright-report/
          retention-days: 14

  playwright-burn-in:
    name: Playwright Smoke Burn-In
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
    timeout-minutes: 35
    if: github.event_name == 'workflow_dispatch' && inputs.run_burn_in

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: vietnam_massage
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d vietnam_massage"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/vietnam_massage
      DIRECT_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/vietnam_massage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm exec prisma generate

      - name: Apply migrations
        run: pnpm exec prisma migrate deploy

      - name: Seed local dev accounts
        run: pnpm exec tsx scripts/seed-dev-accounts.ts

      - name: Run smoke burn-in
        run: pnpm exec playwright test tests/e2e/story-1-2-auth-rbac.spec.ts --repeat-each=10 --reporter=line

      - name: Upload Playwright artifacts
        if: failure() || cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-burn-in-${{ github.run_attempt }}
          path: |
            test-results/
            playwright-report/
          retention-days: 14

  notify-slack:
    name: Slack Notification
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - fast-checks
      - build
      - playwright-smoke
      - playwright-full
      - playwright-burn-in
    if: always()
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      REPOSITORY: ${{ github.repository }}
      BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
      COMMIT_SHA: ${{ github.sha }}
      COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      COMMIT_MESSAGE: ${{ github.event.head_commit.message || github.event.pull_request.title || github.event_name }}
      FAST_CHECKS_RESULT: ${{ needs.fast-checks.result }}
      BUILD_RESULT: ${{ needs.build.result }}
      PLAYWRIGHT_SMOKE_RESULT: ${{ needs.playwright-smoke.result }}
      PLAYWRIGHT_FULL_RESULT: ${{ needs.playwright-full.result }}
      PLAYWRIGHT_BURN_IN_RESULT: ${{ needs.playwright-burn-in.result }}
    steps:
      - name: Send Slack notification
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL secret is not set; skipping Slack notification."
            exit 0
          fi

          overall="success"
          for result in "$FAST_CHECKS_RESULT" "$BUILD_RESULT" "$PLAYWRIGHT_SMOKE_RESULT" "$PLAYWRIGHT_FULL_RESULT" "$PLAYWRIGHT_BURN_IN_RESULT"; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              overall="failure"
            fi
          done

          if [ "$overall" = "success" ]; then
            icon=":white_check_mark:"
            status="CI passed"
            color="#2eb67d"
          else
            icon=":x:"
            status="CI failed"
            color="#e01e5a"
          fi

          short_sha="${COMMIT_SHA:0:7}"
          COMMIT_MESSAGE="${COMMIT_MESSAGE%%$'\n'*}"
          export icon status color short_sha

          payload="$(
            python3 -c '
          import json
          import os

          icon = os.environ["icon"]
          status = os.environ["status"]
          color = os.environ["color"]
          repository = os.environ["REPOSITORY"]
          branch = os.environ["BRANCH_NAME"]
          short_sha = os.environ["short_sha"]
          commit_url = os.environ["COMMIT_URL"]
          run_url = os.environ["RUN_URL"]
          commit_message = os.environ["COMMIT_MESSAGE"]
          results = {
              "Fast Checks": os.environ["FAST_CHECKS_RESULT"],
              "Production Build": os.environ["BUILD_RESULT"],
              "Playwright Smoke": os.environ["PLAYWRIGHT_SMOKE_RESULT"],
              "Playwright Full": os.environ["PLAYWRIGHT_FULL_RESULT"],
              "Playwright Smoke Burn-In": os.environ["PLAYWRIGHT_BURN_IN_RESULT"],
          }

          fields = [
              {"title": "Repository", "value": repository, "short": True},
              {"title": "Branch", "value": branch, "short": True},
              {"title": "Commit", "value": f"<{commit_url}|{short_sha}> {commit_message}", "short": False},
              {"title": "Jobs", "value": "\n".join(f"{name}: {result}" for name, result in results.items()), "short": False},
          ]

          print(json.dumps({
              "text": f"{icon} {status}: {repository}@{branch} ({short_sha})",
              "attachments": [{
                  "color": color,
                  "fields": fields,
                  "actions": [{
                      "type": "button",
                      "text": "Open workflow run",
                      "url": run_url,
                  }],
              }],
          }))
          '
          )"

          curl -sS -X POST -H "Content-type: application/json" --data "$payload" "$SLACK_WEBHOOK_URL"
